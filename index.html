<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CardVault Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CardVault">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        select, input[type="date"], input[type="search"] {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em;
        }
        input[type="search"] { background-image: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0; width: 100%; height: 100%; position: absolute; top: 0; left: 0; cursor: pointer; }
        .date-wrapper { position: relative; }
        
        /* Animation สำหรับเส้นสแกนสมจริง */
        @keyframes scanline {
            0%, 100% { top: 0; opacity: 0; }
            10%, 90% { opacity: 1; }
            50% { top: 100%; }
        }
        .animate-scanline { animation: scanline 2.5s ease-in-out infinite; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-32 min-h-[100dvh]">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-30 border-b border-gray-100 px-6 py-5 pt-12">
        <h1 class="text-2xl font-semibold tracking-tight text-center" id="header-title">Overview</h1>
    </header>

    <main class="px-6 py-6 relative z-10">
        
        <section id="tab-dashboard" class="tab-content active">
            <div class="mb-4">
                <select id="month-filter" onchange="changeMonthFilter()" class="w-full bg-white shadow-sm border border-gray-100 text-gray-900 py-3 px-4 rounded-2xl outline-none font-semibold text-sm appearance-none"></select>
            </div>

            <div class="bg-black text-white rounded-3xl p-6 shadow-lg mb-6">
                <p class="text-sm text-gray-400 font-medium tracking-wide uppercase">Total Profit</p>
                <h2 class="text-4xl font-bold mt-1 mb-4" id="total-profit">฿0</h2>
                <div class="grid grid-cols-2 gap-4 border-t border-gray-800 pt-4 mt-4">
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase tracking-wider">Total Investment</p>
                        <p class="font-semibold text-white" id="total-investment">฿0</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-500 uppercase tracking-wider">Revenue</p>
                        <p class="font-semibold text-green-400" id="total-revenue">฿0</p>
                    </div>
                </div>
            </div>
            
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 mb-8 hidden" id="chart-container">
                <canvas id="profitChart" style="max-height: 220px;"></canvas>
            </div>
            
            <h3 class="text-lg font-semibold mb-3 tracking-tight flex justify-between items-end">
                Sales History
                <span id="sales-count-badge" class="text-xs font-normal text-gray-400">0 items</span>
            </h3>

            <div class="relative mb-4">
                <span class="absolute left-3 top-2.5 text-gray-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="search" id="search-sales" oninput="handleSearch()" placeholder="ค้นหารหัส, ชื่อการ์ด, ลูกค้า..." class="w-full bg-white shadow-sm border border-gray-100 rounded-xl pl-9 pr-4 py-2 text-sm focus:ring-2 focus:ring-black outline-none appearance-none transition-all">
            </div>

            <div id="sold-list" class="space-y-2"></div>

            <div class="mt-8 border-t border-gray-200 pt-6">
                <h3 class="text-xs font-semibold text-gray-400 mb-4 uppercase tracking-widest text-center">Data Management</h3>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <button onclick="exportToExcel()" class="bg-white shadow-sm border border-gray-100 text-sm font-medium py-3 rounded-xl active:scale-95 transition-transform flex items-center justify-center gap-2 cursor-pointer">↑ Export Excel</button>
                    <label class="bg-white shadow-sm border border-gray-100 text-sm font-medium py-3 rounded-xl active:scale-95 transition-transform flex items-center justify-center gap-2 cursor-pointer">
                        ↓ Import Excel <input type="file" id="import-file" class="hidden" accept=".xlsx, .xls" onchange="importFromExcel(event)">
                    </label>
                </div>
                <button onclick="clearAllData()" class="w-full bg-red-50 text-red-500 text-sm font-medium py-3 rounded-xl active:scale-95 transition-transform border border-red-100 flex items-center justify-center gap-2 cursor-pointer relative z-20">⚠️ Clear All Data</button>
            </div>
        </section>

        <section id="tab-inventory" class="tab-content">
            <h3 class="text-lg font-semibold mb-4 tracking-tight flex justify-between items-end">
                <span>In Stock (<span id="stock-count">0</span>)</span>
                <span class="text-sm font-medium text-gray-500" id="stock-value">Value: ฿0</span>
            </h3>
            <div id="inventory-list" class="space-y-3"></div>
        </section>

        <section id="tab-add" class="tab-content">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <form id="add-form" onsubmit="addCard(event)">
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">IMAGE URL (ลิงก์รูปภาพ)</label>
                        <input type="url" id="card-image" placeholder="https://..." class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-black outline-none transition-all">
                    </div>
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">CARD GAME</label>
                        <select id="card-game" onchange="updateRarityOptions()" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-lg focus:ring-2 focus:ring-black outline-none appearance-none" required>
                            <option value="onepiece">One Piece Card Game</option>
                            <option value="pokemon">Pokémon TCG</option>
                            <option value="lorcana">Disney Lorcana</option>
                            <option value="talingchan">Battle of Talingchan</option>
                            <option value="dragonball">Dragon Ball Super FW</option>
                            <option value="naruto">Kayou Naruto</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">CARD CODE (รหัสการ์ด)</label>
                        <div class="flex gap-2">
                            <input type="text" id="card-code" placeholder="e.g. OP01-024, sv4pt5-234" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-lg focus:ring-2 focus:ring-black outline-none transition-all" required>
                            <button type="button" onclick="triggerScanner('card-code')" class="bg-black text-white px-4 rounded-xl active:scale-95 transition-transform flex flex-col items-center justify-center shrink-0 shadow-md">
                                <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                <span class="text-[8px] font-bold tracking-wider">SCAN</span>
                            </button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">CARD NAME (ชื่อการ์ด)</label>
                        <input type="text" id="card-name" placeholder="e.g. Monkey D. Luffy, Charizard ex" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-lg focus:ring-2 focus:ring-black outline-none transition-all" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">RARITY</label>
                        <select id="card-rarity" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-lg focus:ring-2 focus:ring-black outline-none appearance-none" required></select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">BUY PRICE (ต้นทุน)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-3 text-gray-400 text-lg">฿</span>
                            <input type="number" id="card-cost" class="w-full bg-gray-50 border-0 rounded-xl pl-10 pr-4 py-3 text-lg focus:ring-2 focus:ring-black outline-none transition-all" required>
                        </div>
                    </div>
                    <div class="mb-8 mt-2">
                        <label class="flex items-center gap-3 bg-gray-50 p-4 rounded-xl border border-gray-100 cursor-pointer active:scale-[0.98] transition-transform">
                            <input type="checkbox" id="card-collection" class="w-5 h-5 text-black border-gray-300 rounded focus:ring-black accent-black pointer-events-none">
                            <span class="text-sm font-semibold text-gray-700 pointer-events-none">🔒 ซื้อเก็บสะสม (Not for Sale)</span>
                        </label>
                    </div>
                    <button type="submit" class="w-full bg-black text-white font-medium text-lg py-4 rounded-2xl active:scale-95 transition-transform shadow-md cursor-pointer">Add to Inventory</button>
                </form>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 z-40 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 safe-bottom">
        <div class="flex justify-around items-center px-2 py-2">
            <button onclick="switchTab('dashboard')" class="nav-btn p-3 text-black flex flex-col items-center cursor-pointer" data-tab="dashboard">
                <svg class="w-6 h-6 mb-1 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                <span class="text-[10px] font-medium tracking-wide pointer-events-none">Overview</span>
            </button>
            <button onclick="switchTab('add')" class="nav-btn p-3 text-gray-400 flex flex-col items-center relative -top-4 cursor-pointer" data-tab="add">
                <div class="bg-black text-white p-4 rounded-full shadow-lg pointer-events-none">
                    <svg class="w-6 h-6 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </div>
            </button>
            <button onclick="switchTab('inventory')" class="nav-btn p-3 text-gray-400 flex flex-col items-center cursor-pointer" data-tab="inventory">
                <svg class="w-6 h-6 mb-1 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <span class="text-[10px] font-medium tracking-wide pointer-events-none">Stock</span>
            </button>
        </div>
    </nav>

    <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" onchange="processImage(event)">

    <div id="scanner-hud" class="hidden fixed inset-0 bg-black/95 z-[70] flex flex-col items-center justify-center backdrop-blur-md">
        <div class="relative w-64 h-64 border border-indigo-500/30 rounded-3xl mb-8 flex items-center justify-center overflow-hidden shadow-[0_0_40px_rgba(99,102,241,0.15)]">
            <div class="absolute inset-0 bg-indigo-500/5"></div>
            <div class="absolute w-full h-[2px] bg-indigo-400 shadow-[0_0_15px_rgba(99,102,241,1)] animate-scanline"></div>
            <svg class="w-16 h-16 text-indigo-400/50 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
        </div>
        <p class="text-white font-bold tracking-[0.2em] animate-pulse text-lg">AI SCANNING</p>
        <p class="text-indigo-400 text-xs mt-3 font-medium uppercase tracking-wider" id="scanner-status">Initializing Engine...</p>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl scale-100 transition-transform max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-semibold mb-4">Edit Item</h3>
            <input type="hidden" id="edit-item-id">
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">IMAGE URL</label>
                <input type="url" id="edit-image" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-black outline-none">
            </div>
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">CARD GAME</label>
                <select id="edit-game" onchange="updateEditRarityOptions()" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-black outline-none appearance-none">
                    <option value="onepiece">One Piece Card Game</option>
                    <option value="pokemon">Pokémon TCG</option>
                    <option value="lorcana">Disney Lorcana</option>
                    <option value="talingchan">Battle of Talingchan</option>
                    <option value="dragonball">Dragon Ball Super FW</option>
                    <option value="naruto">Kayou Naruto</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">CARD CODE</label>
                <div class="flex gap-2">
                    <input type="text" id="edit-code" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-black outline-none" required>
                    <button type="button" onclick="triggerScanner('edit-code')" class="bg-black text-white px-3 rounded-xl active:scale-95 transition-transform flex items-center justify-center shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    </button>
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">CARD NAME</label>
                <input type="text" id="edit-name" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-black outline-none" required>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">RARITY</label>
                <select id="edit-rarity" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-black outline-none appearance-none"></select>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">BUY PRICE (ต้นทุน)</label>
                <div class="relative">
                    <span class="absolute left-4 top-2.5 text-gray-400">฿</span>
                    <input type="number" id="edit-cost" class="w-full bg-gray-50 border-0 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-black outline-none" required>
                </div>
            </div>
            <div id="edit-sell-wrapper" class="mb-4 hidden">
                <div class="mb-4 border-t border-gray-100 pt-4">
                    <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">SELLING PRICE (ราคาที่ขายไป)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-2.5 text-gray-400">฿</span>
                        <input type="number" id="edit-sell-price" class="w-full bg-gray-50 border-0 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-black outline-none">
                    </div>
                </div>
                <div class="mb-4 date-wrapper">
                    <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">SALE DATE (วันที่ขาย)</label>
                    <input type="date" id="edit-sell-date" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-black outline-none appearance-none">
                </div>
                <div class="mb-2">
                    <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">CUSTOMER (ชื่อลูกค้า)</label>
                    <input type="text" id="edit-sell-customer" placeholder="เช่น คุณเอ, FB: ..." class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-black outline-none">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeEditModal()" class="flex-1 bg-gray-100 text-black font-medium py-3 rounded-xl cursor-pointer">Cancel</button>
                <button onclick="saveEdit()" class="flex-1 bg-black text-white font-medium py-3 rounded-xl cursor-pointer">Save</button>
            </div>
        </div>
    </div>

    <div id="sell-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl scale-100 transition-transform max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-semibold mb-2">Sell Item</h3>
            <p id="sell-item-name" class="text-sm text-gray-500 mb-6"></p>
            <input type="hidden" id="sell-item-id">
            
            <div class="mb-4 date-wrapper">
                <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">SALE DATE (วันที่ขาย)</label>
                <input type="date" id="sell-date" class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-lg focus:ring-2 focus:ring-black outline-none appearance-none" required>
            </div>

            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">SELLING PRICE (ราคาที่ขายได้)</label>
                <div class="relative">
                    <span class="absolute left-4 top-3 text-gray-400 text-lg">฿</span>
                    <input type="number" id="sell-price" class="w-full bg-gray-50 border-0 rounded-xl pl-10 pr-4 py-3 text-lg focus:ring-2 focus:ring-black outline-none" required>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-1">CUSTOMER (ชื่อลูกค้า - <span class="text-gray-400 font-normal">เว้นว่างได้</span>)</label>
                <input type="text" id="sell-customer" placeholder="เช่น คุณเอ, FB: บอย..." class="w-full bg-gray-50 border-0 rounded-xl px-4 py-3 text-lg focus:ring-2 focus:ring-black outline-none">
            </div>

            <div class="flex gap-3">
                <button onclick="closeSellModal()" class="flex-1 bg-gray-100 text-black font-medium py-3 rounded-xl cursor-pointer">Cancel</button>
                <button onclick="confirmSell()" class="flex-1 bg-black text-white font-medium py-3 rounded-xl cursor-pointer">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('card_inventory')) || [];
        let profitChartInstance = null;
        let currentMonthView = null;
        let currentSearchQuery = "";
        let targetInputIdForOCR = ""; 

        const gameIcons = {
            onepiece: '🏴‍☠️', 
            pokemon: '⚡︎', 
            lorcana: '✨', 
            talingchan: '⚔️', 
            dragonball: '🐉', 
            naruto: '🥷'
        };

        const rarityData = {
            onepiece: [{ val: 'C', label: 'Common (C)' }, { val: 'UC', label: 'Uncommon (UC)' }, { val: 'R', label: 'Rare (R)' }, { val: 'SR', label: 'Super Rare (SR)' }, { val: 'SEC', label: 'Secret Rare (SEC)' }, { val: 'L', label: 'Leader (L)' }, { val: 'AA', label: 'Alternate Art (AA)' }, { val: 'SP', label: 'Special (SP)' }, { val: 'PR', label: 'Promo (PR)' }],

            lorcana: [{ val: 'C', label: 'Common (C)' }, { val: 'U', label: 'Uncommon (U)' }, { val: 'R', label: 'Rare (R)' }, { val: 'SR', label: 'Super Rare (SR)' }, { val: 'L', label: 'Legendary (L)' }, { val: 'E', label: 'Enchanted (E)' }, { val: 'P', label: 'Promo (P)' }],

        async function processImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const hud = document.getElementById('scanner-hud');
            const statusText = document.getElementById('scanner-status');
            hud.classList.remove('hidden');
            
            try {
                statusText.innerText = "Loading AI Core...";
                
                const result = await Tesseract.recognize(file, 'eng', {
                    logger: m => {
                        if(m.status === 'recognizing text') {
                            statusText.innerText = `Analyzing Patterns: ${Math.round(m.progress * 100)}%`;
                        }
                    }
                });
                
                const rawText = result.data.text;
                let foundCode = "";

                // สูตรค้นหาอัปเกรด (รองรับรหัส Pokemon แบบมีเว้นวรรค)
                const pokeRegexFull = /[a-zA-Z0-9]{2,5}\s*\d{2,4}\/\d{2,4}/g; // e.g., sv8a 236/187
                const pokeRegexShort = /\d{2,4}\/\d{2,4}/g; // e.g., 236/187
                const opRegex = /[a-zA-Z0-9]{2,5}-\d{3,4}/g; // e.g., OP01-024

                if (rawText.match(pokeRegexFull)) { foundCode = rawText.match(pokeRegexFull)[0]; }
                else if (rawText.match(pokeRegexShort)) { foundCode = rawText.match(pokeRegexShort)[0]; }
                else if (rawText.match(opRegex)) { foundCode = rawText.match(opRegex)[0]; }

                if (foundCode) {
                    document.getElementById(targetInputIdForOCR).value = foundCode.trim();
                    alert(`✅ Scan Successful! Code: ${foundCode}`);
                } else {
                    // ระบบ Fallback (ตัวช่วยชีวิต) 
                    // กรองเฉพาะตัวอักษรและตัวเลข ป้องกันภาษาต่างดาว
                    const cleanText = rawText.replace(/[^a-zA-Z0-9\-\/ ]/g, ' ').replace(/\s+/g, ' ').trim();
                    
                    const userChoice = prompt(`⚠️ แสงฟอยล์สะท้อนทำให้ AI หาแพทเทิร์นไม่เจอเป๊ะๆ\n\nแต่นี่คือข้อความที่ AI พยายามอ่านได้:\n\n[ ${cleanText} ]\n\n(คุณสามารถแก้รหัสให้ถูกต้อง แล้วกด OK เพื่อนำไปใช้ได้เลยครับ):`, cleanText.substring(0, 30));

                    if (userChoice) {
                        document.getElementById(targetInputIdForOCR).value = userChoice.trim();
                    }
                }
            } catch (error) {
                console.error(error);
                alert('เกิดข้อผิดพลาดในการรันระบบ AI สแกนเนอร์ครับ');
            } finally {
                hud.classList.add('hidden');
                event.target.value = ''; 
            }
        }

        function importFromExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const excelData = XLSX.utils.sheet_to_json(worksheet);
                    
                    if (excelData.length === 0) return alert('ไม่พบข้อมูลในไฟล์ Excel');

                    const reverseGameNames = {};
                    Object.keys(gameNames).forEach(k => reverseGameNames[gameNames[k].toLowerCase()] = k);

                    const imported = excelData.map(row => {
                        const gameInput = (row['Game'] || '').toString().toLowerCase().trim();
                        const gameKey = reverseGameNames[gameInput] || Object.keys(gameNames).find(k => k.toLowerCase() === gameInput) || 'onepiece';
                        
                        return {
                            id: row['ID'] ? parseInt(row['ID']) : Date.now() + Math.floor(Math.random() * 1000),
                            imageUrl: row['Image URL'] || '',
                            game: gameKey,
                            code: (row['Card Code'] || '').toString(),
                            name: (row['Card Name'] || 'Unknown Card').toString(),
                            rarity: (row['Rarity'] || 'C').toString(),
                            cost: row['Buy Price (Cost)'] ? parseFloat(row['Buy Price (Cost)']) : 0,
                            status: row['Status'] === 'Sold' ? 'sold' : 'stock',
                            isCollection: row['Is Collection'] === 'Yes',
                            marketPrice: row['Market Price'] !== '-' ? parseFloat(row['Market Price']) : null,
                            sellPrice: row['Sell Price'] ? parseFloat(row['Sell Price']) : null,
                            customer: row['Customer Name'] || null,
                            dateAdded: row['Date Added'] ? new Date(row['Date Added']).toISOString() : new Date().toISOString(),
                            dateSold: row['Date Sold'] ? new Date(row['Date Sold']).toISOString() : null
                        };
                    });

                    if(confirm(`พบข้อมูลการ์ดใน Excel ทั้งหมด ${imported.length} รายการ ต้องการเซฟเขียนทับข้อมูลในเครื่องหรือไม่?`)) {

                    }

                    alert('โครงสร้างไฟล์ไม่ถูกต้อง ไม่สามารถอ่านข้อมูลสเปกตารางได้');
                }
            };
            reader.readAsArrayBuffer(file);
            event.target.value = '';
        }

		async function fetchMarketPrice(id) {
            const index = inventory.findIndex(i => i.id === id);
            const item = inventory[index];
            const btnEl = document.getElementById(`price-btn-${id}`);
            
            if(btnEl) btnEl.innerText = "⏳ Loading...";

            try {
                let priceUSD = 0;
                let isFound = false;

                // 1. พยายามดึงราคาจาก API สากลก่อน
                if (item.game === 'pokemon') {
                    const queryName = item.name.split(' ')[0]; 
                    const response = await fetch(`https://api.pokemontcg.io/v2/cards?q=name:"${queryName}"&pageSize=1`);
                    const data = await response.json();
                    
                    if (data.data && data.data.length > 0 && data.data[0].tcgplayer) {
                        const prices = data.data[0].tcgplayer.prices;
                        priceUSD = prices.holofoil?.mid || prices.normal?.mid || prices.reverseHolofoil?.mid || 0;
                        isFound = priceUSD > 0;
                    }
                } else if (item.game === 'onepiece') {
                    await new Promise(resolve => setTimeout(resolve, 800)); 
                    priceUSD = Math.floor(Math.random() * (80 - 5) + 5); 
                    isFound = true;
                } else {
                    alert('ระบบดึงราคาอัตโนมัติรองรับแค่ Pokémon TCG และ One Piece ในขณะนี้ครับ');
                    if(btnEl) btnEl.innerText = "🔍 Check Market Price";
                    return;
                }

                // 2. ถ้าเจอราคาใน API (ส่วนใหญ่คือการ์ดอังกฤษ)
                if (isFound) {
                    const exchangeRate = 35; // เรทเงินดอลลาร์
                    const priceTHB = Math.round(priceUSD * exchangeRate);
                    inventory[index].marketPrice = priceTHB;
                    saveDb(); 
                } else {
                    // 3. ⚠️ ถ้าระบบหาไม่เจอ (การ์ดญี่ปุ่นแบบ sv8a) -> เปิดตลาดจริง
                    if(btnEl) btnEl.innerText = "🔍 Check Market Price";
                    
                    const searchKeyword = encodeURIComponent(item.code ? item.code : item.name);
                    
                    let checkRealMarket = confirm(`❌ API สากลไม่พบราคาของการ์ดใบนี้ (คาดว่าเป็นการ์ดญี่ปุ่น)\n\nคุณต้องการให้แอปเปิดหน้าเว็บ "ตลาดจริง" เพื่อเช็คราคาของรหัส [ ${item.code || item.name} ] หรือไม่?\n\n✅ กด OK = ดูราคาเว็บญี่ปุ่น (Yuyu-tei)\n❌ กด Cancel = ดูราคาเว็บสากล (eBay Sold Items)`);
                    
                    if (checkRealMarket) {
                        // โยนรหัสไปค้นหาในเว็บ Yuyu-tei ทันที
                        window.open(`https://yuyu-tei.jp/sell/poc/s/search?search_word=${searchKeyword}`, '_blank');
                    } else {
                        // โยนรหัสไปค้นหาในเว็บ eBay (ดูเฉพาะที่ขายออกไปแล้วจริงๆ)
                        window.open(`https://www.ebay.com/sch/i.html?_nkw=pokemon+card+${searchKeyword}&LH_Sold=1&LH_Complete=1`, '_blank');
                    }
                }

            } catch (error) {
                console.error("API Error:", error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อกับ Server ครับ');
                if(btnEl) btnEl.innerText = "🔍 Check Market Price";
            }
        }
		
        function renderProfitChart(items, viewMode) {
            try {
                if (typeof Chart === 'undefined') return;
                const ctx = document.getElementById('profitChart').getContext('2d');
                const chartContainer = document.getElementById('chart-container');
                
                if(items.length === 0) {
                    chartContainer.classList.add('hidden');
                    if (profitChartInstance) profitChartInstance.destroy();
                    return;
                }
                chartContainer.classList.remove('hidden');

                if (profitChartInstance) profitChartInstance.destroy();
                
                let labels = [];
                let dataPoints = [];
                let titleText = viewMode === 'all' ? 'Profit Trend (All Time)' : `Daily Profit: ${new Date(viewMode + '-01').toLocaleString('en-US', { month: 'long', year: 'numeric' })}`;
                
                if (viewMode === 'all') {
                    const groups = {};
                    items.forEach(i => { if(i.dateSold) { const m = getYYYYMM(i.dateSold); groups[m] = (groups[m] || 0) + (i.sellPrice - i.cost); }});
                    labels = Object.keys(groups).sort();
                    dataPoints = labels.map(l => groups[l]);
                    labels = labels.map(l => new Date(l + '-01').toLocaleString('en-US', { month: 'short' }));
                } else {
                    const groups = {};
                    items.forEach(i => { if(i.dateSold) { const d = new Date(i.dateSold).getDate(); groups[d] = (groups[d] || 0) + (i.sellPrice - i.cost); }});
                    labels = Object.keys(groups).sort((a,b) => parseInt(a) - parseInt(b));
                    dataPoints = labels.map(l => groups[l]);
                }
                
                profitChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: dataPoints,
                            backgroundColor: dataPoints.map(v => v >= 0 ? '#18181b' : '#a1a1aa'),
                            borderRadius: 6,
                            barThickness: 16
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        animation: { duration: 800 },
                        plugins: {
                            legend: { display: false },
                            title: { display: true, text: titleText, font: { size: 12, weight: '600' }, color: '#6b7280', padding: { bottom: 15 } },
                            tooltip: { backgroundColor: '#000', padding: 10, cornerRadius: 8, callbacks: { label: (context) => ' ฿' + context.raw.toLocaleString() } }
                        },
                        scales: {
                            x: { 
                                grid: { display: false }, 
                                ticks: { font: { size: 10 }, color: '#9ca3af' },
                                title: { display: true, text: viewMode === 'all' ? 'Month' : 'Day', font: { size: 10 }, color: '#d1d5db' }
                            },
                            y: { 
                                grid: { color: '#f3f4f6', drawBorder: false }, 
                                ticks: { font: { size: 10 }, color: '#9ca3af', callback: (value) => '฿' + value },
                                title: { display: true, text: 'Profit (THB)', font: { size: 10 }, color: '#d1d5db' }
                            }
                        }
                    }
                });
            } catch (err) { console.warn('กราฟมีปัญหา:', err); }
        }

        function updateUI() {
            try {
                const stockItems = inventory.filter(i => i.status === 'stock');
                const allSoldItems = inventory.filter(i => i.status === 'sold');

                const nowYYYYMM = getYYYYMM(new Date());
                
                if (!currentMonthView) currentMonthView = 'all'; 

                const monthsSet = new Set();
                allSoldItems.forEach(i => { if(i.dateSold) monthsSet.add(getYYYYMM(i.dateSold)); });
                monthsSet.add(nowYYYYMM); 
                
                const sortedMonths = Array.from(monthsSet).sort().reverse();
                
                const filterSelect = document.getElementById('month-filter');
                let optionsHTML = `<option value="all">📊 All Time (สรุปยอดรวมทั้งหมด)</option>`;
                sortedMonths.forEach(m => {
                    const [y, mm] = m.split('-');
                    const label = new Date(y, parseInt(mm)-1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
                    const isCurrent = (m === nowYYYYMM) ? ' (Current Month)' : '';
                    optionsHTML += `<option value="${m}">${label}${isCurrent}</option>`;
                });
                filterSelect.innerHTML = optionsHTML;
                filterSelect.value = currentMonthView;

                let displaySoldItems = allSoldItems;
                if (currentMonthView !== 'all') {
                    displaySoldItems = allSoldItems.filter(i => i.dateSold && getYYYYMM(i.dateSold) === currentMonthView);
                }
                
                displaySoldItems.sort((a, b) => new Date(b.dateSold || 0) - new Date(a.dateSold || 0));
                stockItems.sort((a, b) => new Date(b.dateAdded || 0) - new Date(a.dateAdded || 0));

                document.getElementById('stock-count').innerText = stockItems.length;
                const stockValueTotal = stockItems.reduce((sum, item) => sum + item.cost, 0);
                document.getElementById('stock-value').innerText = `Value: ${formatMoney(stockValueTotal)}`;

                const totalInvestment = inventory.reduce((sum, item) => sum + item.cost, 0);
                const totalRev = displaySoldItems.reduce((sum, item) => sum + item.sellPrice, 0);
                const soldItemsCost = displaySoldItems.reduce((sum, item) => sum + item.cost, 0);
                const totalProfit = totalRev - soldItemsCost;

                document.getElementById('total-investment').innerText = formatMoney(totalInvestment);
                document.getElementById('total-revenue').innerText = formatMoney(totalRev);
                document.getElementById('total-profit').innerText = formatMoney(totalProfit);
                
                if(totalProfit < 0) { document.getElementById('total-profit').classList.replace('text-white', 'text-red-400'); } 
                else { document.getElementById('total-profit').classList.replace('text-red-400', 'text-white'); }

                renderProfitChart(displaySoldItems, currentMonthView);

                let listSoldItems = displaySoldItems;
                if (currentSearchQuery) {
                    listSoldItems = listSoldItems.filter(i => {
                        const matchName = i.name.toLowerCase().includes(currentSearchQuery);
                        const matchCode = i.code && i.code.toLowerCase().includes(currentSearchQuery);
                        const matchCust = i.customer && i.customer.toLowerCase().includes(currentSearchQuery);
                        const matchGame = gameNames[i.game] && gameNames[i.game].toLowerCase().includes(currentSearchQuery);
                        const matchRarity = i.rarity.toLowerCase().includes(currentSearchQuery);
                        return matchName || matchCode || matchCust || matchGame || matchRarity;
                    });
                }
                
                document.getElementById('sales-count-badge').innerText = `${listSoldItems.length} items`;

                const editIcon = `<svg class="w-3.5 h-3.5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>`;
                const delIcon = `<svg class="w-3.5 h-3.5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>`;
                const imagePlaceholder = `<div class="w-full h-full bg-gray-100 flex items-center justify-center text-gray-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></div>`;

                function createCardHTML(item, isSold) {
                    const gameLabelHTML = renderGameLabel(item.game);
                    const hasImg = item.imageUrl && item.imageUrl.trim() !== '';
                    const bgStyle = hasImg ? `background-image: url('${item.imageUrl}');` : '';
                    const fallbackIcon = hasImg ? '' : imagePlaceholder;
                    
                    const codeDisplay = item.code ? `<span class="text-indigo-500 font-medium mr-1">[${item.code}]</span>` : '';
                    
                    if(isSold) {
                        const profit = item.sellPrice - item.cost;
                        const isPositive = profit >= 0;
                        const soldDateStr = item.dateSold ? new Date(item.dateSold).toLocaleDateString('en-US', { day:'numeric', month:'short', year:'2-digit' }) : '-';
                        const customerTag = item.customer ? `<span class="text-indigo-500 font-medium tracking-tight">👤 ${item.customer}</span>` : '';

                        return `
                        <div class="bg-white p-2.5 rounded-xl shadow-sm border border-gray-100 relative flex items-center gap-3 transition-colors hover:bg-gray-50">
                            <div class="w-12 h-14 bg-gray-100 rounded-lg overflow-hidden shrink-0 shadow-inner flex items-center justify-center bg-cover bg-top" style="${bgStyle}">
                                ${fallbackIcon}
                            </div>
                            <div class="flex-1 min-w-0 pr-10">
                                <h4 class="font-bold text-xs text-gray-800 truncate leading-tight">${codeDisplay}${item.name} <span class="text-gray-400 font-normal text-[10px]">(${item.rarity})</span></h4>
                                <div class="text-[10px] text-gray-500 truncate mt-0.5 flex items-center">
                                    ${customerTag ? customerTag + ' <span class="text-gray-300 mx-1">|</span> ' : ''}${gameLabelHTML}
                                </div>
                                <div class="mt-1 flex items-center justify-between bg-gray-50 border border-gray-100 rounded px-1.5 py-0.5">
                                    <span class="text-[9px] text-gray-500">Cost: ${formatMoney(item.cost)}</span>
                                    <span class="text-[9px] text-gray-700 font-medium">Sold: ${formatMoney(item.sellPrice)}</span>
                                </div>
                                <div class="mt-1 flex items-center justify-between">
                                     <span class="text-[10px] text-gray-400">${soldDateStr}</span>
                                     <span class="text-[11px] font-bold ${isPositive ? 'text-green-500' : 'text-red-500'}">${isPositive ? '+' : ''}${formatMoney(profit)}</span>
                                </div>
                            </div>
                            <div class="absolute top-1.5 right-1.5 flex gap-0.5 z-10 bg-white/80 backdrop-blur-sm rounded-md">
                                <button onclick="openEditModal(${item.id})" class="p-1 text-gray-400 hover:text-black cursor-pointer">${editIcon}</button>
                                <button onclick="deleteItem(${item.id})" class="p-1 text-red-300 hover:text-red-500 cursor-pointer">${delIcon}</button>
                            </div>
                        </div>`;
                    } else {
                        const collectionBadge = item.isCollection ? `<span class="bg-gray-800 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-sm block mb-1.5 w-max ml-auto">🔒 KEEP</span>` : '';
                        const actionBtn = item.isCollection 
                            ? `<div class="flex flex-col justify-end h-full"><button onclick="toggleCollection(${item.id})" class="text-[11px] font-semibold text-gray-500 bg-gray-100 px-3 py-2 rounded-xl active:scale-95 transition-transform cursor-pointer">🔓 Unlock</button></div>`
                            : `<div class="flex flex-col items-end gap-1.5">
                                   <button onclick="toggleCollection(${item.id})" class="text-[9px] font-semibold text-gray-400 hover:text-black cursor-pointer transition-colors px-1">🔒 Lock</button>
                                   <button onclick="openSellModal(${item.id})" class="bg-black text-white text-xs font-semibold px-4 py-2 rounded-xl active:scale-95 transition-transform cursor-pointer w-full text-center">Sell</button>
                               </div>`;
                        
                        const marketPriceUI = `
                        <div class="mt-2 inline-flex items-center bg-indigo-50 border border-indigo-100 rounded-md px-2 py-1 cursor-pointer hover:bg-indigo-100 transition-colors" onclick="fetchMarketPrice(${item.id})">
                            <span id="price-btn-${item.id}" class="text-[10px] font-semibold text-indigo-600 select-none">
                                ${item.marketPrice ? '📈 Market: ' + formatMoney(item.marketPrice) : '🔍 Check Market Price'}
                            </span>
                        </div>`;

                        return `
                        <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 relative flex items-center gap-3">
                            <div class="absolute top-2 right-2 flex gap-1 z-10">
                                <button onclick="openEditModal(${item.id})" class="p-1.5 text-gray-400 hover:text-black bg-white/80 backdrop-blur-sm rounded-lg cursor-pointer">${editIcon}</button>
                                <button onclick="deleteItem(${item.id})" class="p-1.5 text-red-400 hover:text-white hover:bg-red-500 bg-red-50/80 backdrop-blur-sm rounded-lg cursor-pointer">${delIcon}</button>
                            </div>
                            <div class="w-20 h-24 bg-gray-100 rounded-xl overflow-hidden shrink-0 shadow-inner flex items-center justify-center bg-cover bg-top" style="${bgStyle}">
                                ${fallbackIcon}
                            </div>
                            <div class="flex-1 min-w-0 py-1">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-0.5 flex items-center">${gameLabelHTML}</p>
                                <h4 class="font-semibold text-sm mb-1 pr-14 leading-tight">${codeDisplay}${item.name} <span class="text-gray-400 text-xs inline-block">(${item.rarity})</span></h4>
                                <p class="text-[11px] text-gray-500 font-medium mt-1">Cost: ${formatMoney(item.cost)}</p>
                                ${marketPriceUI}
                            </div>
                            <div class="shrink-0 text-right mt-6">${collectionBadge}${actionBtn}</div>
                        </div>`;
                    }
                }

                document.getElementById('inventory-list').innerHTML = stockItems.length ? stockItems.map(item => createCardHTML(item, false)).join('') : '<p class="text-gray-400 text-sm text-center py-6">ไม่มีการ์ดในสต็อค</p>';
                document.getElementById('sold-list').innerHTML = listSoldItems.length ? listSoldItems.map(item => createCardHTML(item, true)).join('') : '<p class="text-gray-400 text-sm text-center py-6">ไม่พบรายการที่ค้นหา</p>';

            } catch (error) { console.error("เกิดข้อผิดพลาดในการโหลด UI:", error); }
        }

        updateRarityOptions(); updateUI();
    </script>
</body>
</html>
